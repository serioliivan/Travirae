<meta charset="utf-8"/>

<title>Отписка от рассылки — Travirae</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-init.js"></script>
<script id="travirae-lang-router">(function(){
  try{
    var siteKey='travirae_site_lang';
    var explicitKey='travirae_site_lang_explicit';
    var manualKey='travirae_site_lang_manual';
    var lang='';
    try{
      if(String(localStorage.getItem(manualKey)||'')==='1') lang=String(localStorage.getItem(siteKey)||'').toUpperCase();
    }catch(e){}
    if(!lang){
      var candidates=[];
      try{
        if(navigator.language) candidates.push(navigator.language);
        if(Array.isArray(navigator.languages)) candidates=candidates.concat(navigator.languages);
      }catch(e){}
      var mapByBase={ it:'ITA', en:'ENG', ar:'ARA', de:'DEU', es:'SPA', ru:'RUS', nl:'NLD', zh:'ZHO', fr:'FRA' };
      for(var i=0;i<candidates.length;i+=1){
        var base=String(candidates[i]||'').toLowerCase().split(/[-_]/)[0];
        if(mapByBase[base]){ lang=mapByBase[base]; break; }
      }
      if(!lang) lang='ENG';
    }
    var map={ DEU:'de', ENG:'en', FRA:'fr', SPA:'es', RUS:'ru', ARA:'ar', NLD:'nl', ZHO:'zh' };
    var suf=map[lang] || '';
    var u=new URL(window.location.href);
    var path=u.pathname||'';
    var file=path.split('/').pop()||'';
    var dir=path.slice(0, path.length-file.length);
    if(!file) file='index.html';
    if(!/\.html$/i.test(file)) return;
    var baseFile=file.replace(/-(de|en|fr|es|ru|ar|nl|zh)\.html$/i,'.html');
    var target=suf ? baseFile.replace(/\.html$/i,'-'+suf+'.html') : baseFile;
    if(target===file) return;
    u.pathname=dir+target;
    window.location.replace(u.toString());
  }catch(e){}
})();</script>
</head>
