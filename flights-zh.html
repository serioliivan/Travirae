  try{
    var siteKey='travirae_site_lang';
    var explicitKey='travirae_site_lang_explicit';
    var lang='';
    try{
      if(String(localStorage.getItem(explicitKey)||'')==='1') lang=String(localStorage.getItem(siteKey)||'').toUpperCase();
    }catch(e){}
    if(!lang){
      var candidates=[];
      try{
        if(Array.isArray(navigator.languages)) candidates=candidates.concat(navigator.languages);
        if(navigator.language) candidates.push(navigator.language);
      }catch(e){}
      var mapByBase={ it:'ITA', en:'ENG', ar:'ARA', de:'DEU', es:'SPA', ru:'RUS', nl:'NLD', zh:'ZHO', fr:'FRA' };
      for(var i=0;i<candidates.length;i+=1){
        var base=String(candidates[i]||'').toLowerCase().split(/[-_]/)[0];
        if(mapByBase[base]){ lang=mapByBase[base]; break; }
      }
      if(!lang) lang='ENG';
    }
    var map={ DEU:'de', ENG:'en', FRA:'fr', SPA:'es', RUS:'ru', ARA:'ar', NLD:'nl', ZHO:'zh' };
    var suf=map[lang] || '';
    var u=new URL(window.location.href);
    var path=u.pathname||'';
    var file=path.split('/').pop()||'';
    var dir=path.slice(0, path.length-file.length);
    if(!file) file='index.html';
    if(!/\.html$/i.test(file)) return;
    var baseFile=file.replace(/-(de|en|fr|es|ru|ar|nl|zh)\.html$/i,'.html');
    var target=suf ? baseFile.replace(/\.html$/i,'-'+suf+'.html') : baseFile;
    if(target===file) return;
    u.pathname=dir+target;
    window.location.replace(u.toString());
  }catch(e){}
})();</script>

<script>

(function(){
  // Widget i18n: sync Aviasales locale + currency with the site language selector
  var AVIA_I18N = {
    ENG: { locale: 'en', currency: 'usd' },
    ARA: { locale: 'ar', currency: 'aed' },
    DEU: { locale: 'de', currency: 'eur' },
    SPA: { locale: 'es', currency: 'eur' },
    RUS: { locale: 'ru', currency: 'rub' },
    NLD: { locale: 'nl', currency: 'eur' },
    ZHO: { locale: 'zh-hans', currency: 'cny' },
    ITA: { locale: 'it', currency: 'eur' },
    FRA: { locale: 'fr', currency: 'eur' }
  };

  function safeGetLS(key){
    try { return (window.localStorage ? localStorage.getItem(key) : '') || ''; } catch(e) { return ''; }
  }

  function currentLangCode(){
    try {
      var sel = document.getElementById('site-lang-select');
      if (sel && sel.value) return sel.value;

    if (window.TRAVIRAE_LANG) return window.TRAVIRAE_LANG;

  function getAviasalesI18n(){

  // Ensure the Aviasales overlay exists (it may be removed after the first click)
  function ensureAviasalesOverlay(){

      var wrapper = document.getElementById('aviasales-widget-wrapper');

      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'aviasales-overlay';

        wrapper.insertBefore(overlay, wrapper.firstChild);
      }
      // reset state for this render
      try { overlay.dataset.tvaFired = '0'; } catch(eD){}
      try {
        if (overlay.__tvaHideTimer) {
          clearTimeout(overlay.__tvaHideTimer);
          overlay.__tvaHideTimer = 0;
        }
      } catch(eTimer){}
      try { overlay.style.pointerEvents = 'auto'; overlay.style.opacity = '1'; } catch(eCss){}
      return overlay;
    }catch(e){ return null; }
  }

  function loadWidget(){
    // Reset widget container before re-render (needed when language changes)
    ensureAviasalesOverlay();
    var container = document.getElementById('aviasales-widget-container');
    if (!container) return;
    container.innerHTML = '';

    var baseSrc = "https://tpemd.com/content?currency=usd&trs=454819&shmarker=669407&show_hotels=false&powered_by=true&locale=en&searchUrl=www.aviasales.com%2Fsearch&primary_override=%232739FEff&color_button=%232739FEff&color_icons=%232739FEff&dark=%23262626&light=%23FFFFFF&secondary=%23FFFFFF&special=%23C4C4C4&color_focused=%232739FEff&border_radius=30&no_labels=&plain=true&promo_id=7879&campaign_id=100";
    var aff = '';
    try {
      if (window.traviraeAffiliate && typeof window.traviraeAffiliate.getId === 'function') {
        aff = window.traviraeAffiliate.getId() || '';
      }
    } catch (e) {
      if (window.console && console.warn) console.warn('Travirae: errore lettura Affiliate ID per Aviasales', e);
    }
// Sync locale + currency (based on site language) and keep affiliate sub_id if present
try {
  var cfg = getAviasalesI18n();
  var u = new URL(baseSrc);
  u.searchParams.set('currency', cfg.currency);
  u.searchParams.set('locale', cfg.locale);
  if (aff) u.searchParams.set('sub_id', aff);
  baseSrc = u.toString();
} catch(eCfg) {
  try {
    var cfg2 = getAviasalesI18n();
    baseSrc = baseSrc.replace(/([?&]currency=)[^&]*/i, '$1' + encodeURIComponent(cfg2.currency));
    baseSrc = baseSrc.replace(/([?&]locale=)[^&]*/i, '$1' + encodeURIComponent(cfg2.locale));
    if (aff && baseSrc.indexOf('sub_id=') === -1) {
      baseSrc += (baseSrc.indexOf('?') === -1 ? '?' : '&') + 'sub_id=' + encodeURIComponent(aff);
    }
  } catch(e2){}
}

var s = document.createElement('script');
s.async = true;
s.charset = 'utf-8';
s.src = baseSrc;
container.appendChild(s);


    // Per intercettare eventi anche se lo script inietta elementi fuori dal container,
    // ascoltiamo su un wrapper più alto (se presente).
    var listenEl = document.getElementById('aviasales-widget-wrapper') || container;

	    // --- Tracking booking click Aviasales (robusto su desktop, incognito e mobile) ---
	    // Problemi tipici:
	    // 1) il widget può usare elementi non-standard (div cliccabili) e quindi il click non è su <button>/<a>
	    // 2) su mobile la navigazione può interrompere le richieste (già mitigato lato main.js con keepalive)
	    // 3) in alcuni casi il widget può renderizzare iframe cross-domain e gli eventi non propagano
	    // Qui facciamo una combinazione di:
	    // - event delegation più permissiva (click/submit nel wrapper)
	    // - patch di window.open (se il widget apre risultati in nuova scheda)
	    // - overlay one-shot SOLO se rileviamo iframe (con z-index alto)
	    try {
	      if (!window.__tva_aviasales_tracking_bound) {
	        window.__tva_aviasales_tracking_bound = true;
	        var lastGestureTs = 0;
	
	      function nowMs(){ return (Date.now ? Date.now() : (new Date()).getTime()); }
	
	      function isAviasalesUrl(u){
	        try{
	          if (!u) return false;
	          var s = String(u);
	          return /aviasales\.|travelpayouts\.|tp\.media|tpemd\.com|hotellook\.|jetradar\./i.test(s);
	        }catch(e){ return false; }
	      }
	
	      function safeTrack(reason){
	        try{
	          if (window.traviraeAffiliate && typeof window.traviraeAffiliate.trackBookingClick === 'function') {
	            if (window.console && console.log) console.log('Travirae: booking click Aviasales', reason || '');
	            window.traviraeAffiliate.trackBookingClick('aviasales');
	          }
	        }catch(e){}
	      }
	
	      function markGesture(){ lastGestureTs = nowMs(); }
	
	      // 1) Segna qualsiasi gesture dentro al wrapper (desktop + mobile)
	      var gestureHandler = function(){ markGesture(); };
	      listenEl.addEventListener('pointerdown', gestureHandler, true);
	      listenEl.addEventListener('mousedown', gestureHandler, true);
	      listenEl.addEventListener('touchstart', gestureHandler, { capture: true, passive: true });
	
	      // 2) Click delegation: link esterni / elementi cliccabili "tipo bottone"
	      var clickHandler = function(e){
	        try{
	          markGesture();
	          var t = (e && e.target) ? e.target : null;
	          if (!t || !t.closest) return;
	          if (t.closest('#aviasales-overlay')) return;
	
	          // Ignora click su campi form (selezione origine/destinazione, date, ecc.)
	          if (t.closest('input, textarea, select, [contenteditable="true"]')) return;
	
	          // Se l'utente clicca un link esterno (href), tracciamo sempre
	          var a = t.closest('a');
	          if (a && a.href && isAviasalesUrl(a.href)) {
	            safeTrack('link');
	            return;
	          }
	
	          // Elementi "button-like" (div, span, ecc.)
	          var btnLike = t.closest('button, [role="button"], input[type="submit"], input[type="button"], [onclick], [data-action], [data-testid], .btn, .button, [class*="btn"], [class*="button"], [class*="submit"], [class*="search"]');
	          if (btnLike) {
	            safeTrack('button-like');
	            return;
	          }
	
	          // Fallback: se clicca dentro al widget su un elemento non-form, spesso significa azione del widget.
	          // (Dedup lato main.js evita doppioni ravvicinati.)
	          if (t.closest('#aviasales-widget-wrapper')) {
	            safeTrack('fallback');
	          }
	        }catch(err){}
	      };
	      listenEl.addEventListener('click', clickHandler, true);
	
	      // 3) Submit (molti widget usano <form>)
	      var submitHandler = function(e){
	        try{
	          markGesture();
	          safeTrack('submit');
	        }catch(err){}
	      };
	      listenEl.addEventListener('submit', submitHandler, true);
	
	      // 4) Patch window.open per catturare apertura risultati (nuova scheda)
	      try{
	        if (!window.__tva_aviasales_open_patch) {
	          window.__tva_aviasales_open_patch = true;
	          var _origOpen = window.open;
	          if (typeof _origOpen === 'function') {
	            window.open = function(url){
	              try{
	                if (isAviasalesUrl(url)) {
	                  var dt = nowMs() - (lastGestureTs || 0);
	                  if (!lastGestureTs || dt < 15000) {
	                    safeTrack('window.open');
	                  }
	                }
	              }catch(e){}
	              return _origOpen.apply(this, arguments);
	            };
	          }
	        }
	      }catch(eOpen){}
	
	      // 5) Fallback navigazione same-tab: se dopo una gesture il tab si chiude/nasconde subito, contiamo.
	      // Utile soprattutto su mobile quando il click porta fuori sito nello stesso tab.
	      try{
	        var _pageHideHandler = function(){
	          try{
	            var dt = nowMs() - (lastGestureTs || 0);
	            if (lastGestureTs && dt < 1200) {
	              safeTrack('pagehide');
	            }
	          }catch(e){}
	        };
	        window.addEventListener('pagehide', _pageHideHandler, true);
	        window.addEventListener('beforeunload', _pageHideHandler, true);
	      }catch(ePh){}
	      }

	    } catch(eBind) {
	      if (window.console && console.warn) console.warn('Travirae: impossibile collegare tracking Aviasales', eBind);
	    }
	
	    // Overlay fallback per iframe/casi in cui gli eventi non arrivano:
	    try {
	      var overlay = ensureAviasalesOverlay();
	      if (overlay) {
	        // porta overlay sopra qualsiasi iframe
	        try { overlay.style.zIndex = '999999'; } catch(eZ){}
	        try { overlay.style.background = 'transparent'; } catch(eB){}
	        try { overlay.style.pointerEvents = 'auto'; } catch(eP){}
// Bind overlay handlers only once per overlay element (avoid duplicate tracking on re-render)
try { if (!overlay.dataset.tvaBound) overlay.dataset.tvaBound = '1'; } catch(eD0){}
var consumeOverlayEvent = function(ev){
  if (!ev) return;
  try { if (typeof ev.preventDefault === 'function') ev.preventDefault(); } catch(ePrev){}
  try { if (typeof ev.stopPropagation === 'function') ev.stopPropagation(); } catch(eStop){}
  try { if (typeof ev.stopImmediatePropagation === 'function') ev.stopImmediatePropagation(); } catch(eStopImm){}
};
var hideOverlay = function(){
  try {
    if (overlay.__tvaHideTimer) {
      clearTimeout(overlay.__tvaHideTimer);
      overlay.__tvaHideTimer = 0;
    }
  } catch(eTimer){}
  try { overlay.style.pointerEvents = 'none'; overlay.style.opacity = '0'; } catch(eCss){}
  try { overlay.remove(); } catch(eRm){ overlay.style.display = 'none'; }
};
var trackOverlayOnce = function(){
  try {
    if (overlay && overlay.dataset && overlay.dataset.tvaFired === '1') return;
    try { overlay.dataset.tvaFired = '1'; } catch(eD1){}
  } catch(eD2) {}
	          try {
	            if (window.traviraeAffiliate && typeof window.traviraeAffiliate.trackBookingClick === 'function') {
	              if (window.console && console.log) console.log('Travirae: booking click Aviasales (overlay)');
	              window.traviraeAffiliate.trackBookingClick('aviasales');
	            }
	          } catch(eTrack){}
};
var scheduleOverlayHide = function(delay){
  try {
    if (overlay.__tvaHideTimer) clearTimeout(overlay.__tvaHideTimer);
  } catch(eTimer3){}
  overlay.__tvaHideTimer = setTimeout(hideOverlay, delay);
};
var fireOverlay = function(ev){
  consumeOverlayEvent(ev);
  trackOverlayOnce();
  scheduleOverlayHide(1600);
};
var releaseOverlay = function(ev){
  consumeOverlayEvent(ev);
  trackOverlayOnce();
  var type = (ev && ev.type) ? ev.type : '';
  var delay = (type === 'click' || type === 'touchcancel' || type === 'pointercancel') ? 0 : 450;
  scheduleOverlayHide(delay);
};
        
// Attach listeners once (per overlay element)
try {
  if (!overlay.dataset.tvaListeners) {
    overlay.dataset.tvaListeners = '1';
    overlay.addEventListener('pointerdown', fireOverlay, true);
    overlay.addEventListener('mousedown', fireOverlay, true);
    overlay.addEventListener('touchstart', fireOverlay, { capture: true, passive: false });
    overlay.addEventListener('pointerup', releaseOverlay, true);
    overlay.addEventListener('mouseup', releaseOverlay, true);
    overlay.addEventListener('pointercancel', releaseOverlay, true);
    overlay.addEventListener('click', releaseOverlay, true);
    overlay.addEventListener('touchend', releaseOverlay, { capture: true, passive: false });
    overlay.addEventListener('touchcancel', releaseOverlay, { capture: true, passive: false });
  }
} catch(eL) {}
	
	        // Mantieni il primo gesto "blank" su tutto il widget, anche senza iframe.
	        overlay.style.display = 'block';
	      }
	    } catch(eOverlay) {
	      if (window.console && console.warn) console.warn('Travirae: overlay tracking Aviasales non disponibile', eOverlay);
	    }

  }

// Re-render widget when the site language changes (sync locale + currency)
document.addEventListener('change', function(e){
  if (e && e.target && e.target.id === 'site-lang-select') {
    loadWidget();
  }
});

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadWidget);
  } else {
    loadWidget();
  }
})();
</script>
